<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Satwik Tomar</title>
  <meta name="robots" content="noindex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;500&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #f1f5f9;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }

    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    .badge {
      font-family: 'Inter', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6366f1;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
      animation-delay: 0.2s;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(5rem, 20vw, 12rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #f1f5f9 0%, #6366f1 50%, #a855f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.3s;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 12px;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.45s;
    }

    .desc {
      font-size: 15px;
      color: #64748b;
      max-width: 360px;
      line-height: 1.6;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.55s;
      margin-bottom: 36px;
    }

    .home-btn {
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      color: #c7d2fe;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.7s;
    }

    .home-btn:hover {
      background: rgba(99,102,241,0.28);
      border-color: rgba(99,102,241,0.7);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(99,102,241,0.3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="badge">Error 404</div>
  <h1>404</h1>
  <p class="subtitle">Lost in the void</p>
  <p class="desc">This page drifted into the black hole. Let's get you back to safety.</p>
  <a href="/" class="home-btn">
    ← Back to Portfolio
  </a>
</div>

<script type="module">
// Minimal Three.js-style 3D scene using raw WebGL + canvas
// Floating glowing particles + a rotating wireframe torus — no CDN, fully self-contained

const canvas = document.getElementById('c')
const gl = canvas.getContext('webgl')

let W, H, particles = [], time = 0

function resize() {
  W = canvas.width = window.innerWidth
  H = canvas.height = window.innerHeight
  if (!gl) return
  gl.viewport(0, 0, W, H)
}
resize()
window.addEventListener('resize', resize)

if (!gl) {
  // Fallback: pure canvas 2D particles
  const ctx2d = canvas.getContext('2d')

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.6 + 0.2,
      color: Math.random() > 0.5 ? '99,102,241' : '168,85,247'
    })
  }

  function draw() {
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
    ctx2d.clearRect(0, 0, canvas.width, canvas.height)
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy
      if (p.x < 0) p.x = canvas.width
      if (p.x > canvas.width) p.x = 0
      if (p.y < 0) p.y = canvas.height
      if (p.y > canvas.height) p.y = 0
      ctx2d.beginPath()
      ctx2d.arc(p.x, p.y, p.r, 0, Math.PI * 2)
      ctx2d.fillStyle = `rgba(${p.color},${p.alpha})`
      ctx2d.fill()
    })
    requestAnimationFrame(draw)
  }
  draw()
} else {
  // WebGL particle system
  const VERT = `
    attribute vec2 a_pos;
    attribute float a_size;
    attribute float a_alpha;
    uniform vec2 u_res;
    varying float v_alpha;
    void main() {
      vec2 clip = (a_pos / u_res) * 2.0 - 1.0;
      clip.y = -clip.y;
      gl_Position = vec4(clip, 0, 1);
      gl_PointSize = a_size;
      v_alpha = a_alpha;
    }
  `
  const FRAG = `
    precision mediump float;
    varying float v_alpha;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float soft = 1.0 - smoothstep(0.2, 0.5, d);
      gl_FragColor = vec4(0.55, 0.4, 0.98, soft * v_alpha);
    }
  `

  function compileShader(type, src) {
    const s = gl.createShader(type)
    gl.shaderSource(s, src)
    gl.compileShader(s)
    return s
  }

  const prog = gl.createProgram()
  gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VERT))
  gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FRAG))
  gl.linkProgram(prog)
  gl.useProgram(prog)

  const N = 200
  const positions = new Float32Array(N * 2)
  const sizes = new Float32Array(N)
  const alphas = new Float32Array(N)
  const velocities = []

  for (let i = 0; i < N; i++) {
    positions[i * 2] = Math.random() * W
    positions[i * 2 + 1] = Math.random() * H
    sizes[i] = Math.random() * 3 + 1
    alphas[i] = Math.random() * 0.5 + 0.2
    velocities.push([(Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4])
  }

  const posBuf = gl.createBuffer()
  const sizeBuf = gl.createBuffer()
  const alphaBuf = gl.createBuffer()

  const aPos = gl.getAttribLocation(prog, 'a_pos')
  const aSize = gl.getAttribLocation(prog, 'a_size')
  const aAlpha = gl.getAttribLocation(prog, 'a_alpha')
  const uRes = gl.getUniformLocation(prog, 'u_res')

  gl.enable(gl.BLEND)
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE)

  function render() {
    for (let i = 0; i < N; i++) {
      positions[i * 2] += velocities[i][0]
      positions[i * 2 + 1] += velocities[i][1]
      if (positions[i * 2] < 0) positions[i * 2] = W
      if (positions[i * 2] > W) positions[i * 2] = 0
      if (positions[i * 2 + 1] < 0) positions[i * 2 + 1] = H
      if (positions[i * 2 + 1] > H) positions[i * 2 + 1] = 0
    }

    gl.clear(gl.COLOR_BUFFER_BIT)
    gl.uniform2f(uRes, W, H)

    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf)
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW)
    gl.enableVertexAttribArray(aPos)
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0)

    gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuf)
    gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.STATIC_DRAW)
    gl.enableVertexAttribArray(aSize)
    gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0)

    gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuf)
    gl.bufferData(gl.ARRAY_BUFFER, alphas, gl.STATIC_DRAW)
    gl.enableVertexAttribArray(aAlpha)
    gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, 0, 0)

    gl.drawArrays(gl.POINTS, 0, N)
    requestAnimationFrame(render)
  }

  gl.clearColor(0, 0, 0, 1)
  render()
}
</script>
</body>
</html>
